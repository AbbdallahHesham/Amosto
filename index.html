<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amosto_Glam</title>

<link rel="stylesheet" href="style.css">
</head>

<body>
<header>Amosto_Glam</header>
<!-- اللوجو Full Screen -->
<header class="hero">
    <img src="logo.jpeg" alt="Amosto Logo">
</header>

<!-- باقي الموقع -->
<section class="content">

    <div class="note">
        30% Deposit
    </div>

    <div class="filters">
        <button onclick="filter('all')">All</button>
        <button onclick="filter('chain')">Chains</button>
        <button onclick="filter('ring')">Rings</button>
        <button onclick="filter('bracelet')">Bracelets</button>
    </div>

    <div class="container">
        <div class="products">

            <div class="product chain">
                <img src="chain.jpeg">
                <h3>Stylish Chain</h3>
                <p class="price">190 EGP</p>
                <button class="order" onclick="order('Stylish Chain',190)">Order Now</button>
            </div>

            <div class="product ring">
                <img src="ring.jpeg">
                <h3>Elegant Ring</h3>
                <p class="price">150 EGP</p>
                <button class="order" onclick="order('Elegant Ring',150)">Order Now</button>
            </div>

            <div class="product bracelet">
                <img src="bracelet.jpeg">
                <h3>Soft Bracelet</h3>
                <p class="price">160 EGP</p>
                <button class="order" onclick="order('Soft Bracelet',160)">Order Now</button>
            </div>

            <div class="product bracelet">
                <img src="bracelet1.jpeg">
                <h3>Premium Bracelet</h3>
                <p class="price">180 EGP</p>
                <button class="order" onclick="order('Premium Bracelet',180)">Order Now</button>
            </div>

        </div>
    </div>

</section>

<script>
function order(product, price) {
    let deposit = Math.round(price * 0.3);
    let phone = "2001153869456";

    let message = `Hello, I want to order ${product}
Price: ${price} EGP
Deposit: ${deposit} EGP`;

    let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
}

function filter(category) {
    let items = document.querySelectorAll('.product');

    items.forEach(item => {
        if (category === 'all') {
            item.style.display = 'block';
        } else {
            item.style.display = item.classList.contains(category) ? 'block' : 'none';
        }
    });
}
</script>


<!-- الفوتر -->
<footer class="footer">
    <div class="footer-content">
        <p>Follow us on social media:</p>
        <div class="social-links">
            <a href="https://www.facebook.com/share/1CDBSPhcqy/?mibextid=wwXIfr"  rel="noopener noreferrer">Facebook</a> &
            <a href="https://www.instagram.com/amosto_glam?igsh=ZDdmcWMzajFqaXpw&utm_source=qr"  rel="noopener noreferrer">Instagram</a>
            <p>01153869456 & 01004682009</p>
        </div>
    </div>
</footer>
    


</body>
</html>
